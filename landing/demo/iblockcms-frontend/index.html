<html>
<!-- todo: to template -->

<head>
    <meta charset="utf-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-giJF6kkoqNQ00vy+HMDP7azOuL0xtbfIcaT9wjKHr8RbDVddVHyTfAAsrekwKmP1" crossorigin="anonymous">
    <link href='http://fonts.googleapis.com/css?family=Roboto' rel='stylesheet' type='text/css'>
    <script src="https://unpkg.com/rxjs@^7/dist/bundles/rxjs.umd.min.js "></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.2/axios.min.js"
        integrity="sha512-b94Z6431JyXY14iSXwgzeZurHHRNkLt9d6bAHt7BZT38eqV+GyngIi/tVye4jBKPYQ2lBdRs0glww4fmpuLRwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <script src="https://cdn.jsdelivr.net/gh/ru51a4/rrender/dist/rrender.js"></script>

    <script src="store.js"></script>
    <script src="api.js"></script>
    <script src="./components/header-menu/header-menu.component.js"></script>

    <script src="./components/catalog/catalog.component.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<style>

</style>

<body>
    <div class="container main">
        <main />
    </div>
    <style>
        .zhs {
            display: none;
        }

        .zhs-menu-event:hover .zhs {
            display: block;
        }

        .zhs-menu {
            display: flex;
        }

        .zhs-menu .zhs-menu--items {
            display: inline-flex;
            flex-direction: column;
        }

        .ffilter {
            background: #f1f1f1;
            padding: 20px;
            height: 100%;

        }

        .zhs-menu--items--item {
            display: flex !important;
            justify-content: space-between !important;
            align-items: center;
            min-width: none;
            min-width: 290px !important;
        }

        .zhs-menu .zhs-menu--items--item {
            height: 50px;
            padding: .5rem 1rem;
            display: block;
            cursor: pointer;
            color: #fff;
            background-color: #0d6efd;
        }

        .zhs-menu .zhs-menu--items--item:hover {
            height: 50px;
            padding: .5rem 1rem;
            display: block;
            cursor: pointer;
            color: #fff;
            background-color: purple;
        }

        .zhs-menu .zhs-menu--items--item a {
            color: white;
            text-decoration: none;
        }
    </style>


    <script>
        var Render;
        class component_main extends component {
            state = {
                data: {},
                page: 1,
                tree: [],
                cSection: 1,
                breadcrumb: () => {
                    return this.state?.tree?.[this.state.cSection]?.['path'].reduce((acc, item, i) => {
                        return acc + ((i == 0) ? '' : '<span> / </span>') + `<span>${this.state?.tree[item]['key']}</span>`
                    }, '')
                },
                total: () => {
                    return `total - ` + this.state.data?.count;
                },
                pageStart: () => {
                    return this.state?.page - 1 >= 1;
                },
                pageEnd: () => {
                    return ((this.state?.page + 1) <= Math.ceil(this.state.data?.count / 9));
                },
                init: () => {
                    return this.state.tree.length ? '' : 'display:none;'
                },
                ffilter: () => {
                    return Object.keys(this.props).map((c) => this.props[c])
                },
                fff: () => {
                    return Boolean(Object.keys(this.props).length)
                },
                fc: () => {
                    return Boolean(Object.keys(this.props).length) ? 'col-9' : 'col-12'
                },
                checkedd: () => {
                    console.log(this)
                    return this.currprops.includes(1)

                }
            };
            init() {
                Api.getCatalog(1, 1).then((data) => {
                    let t = data.data.tree

                    let dfs = (node) => {
                        for (let key in node) {
                            if (node[key]['key']) {
                                this.state.tree[key] = node[key];
                                dfs(node[key]);
                            }
                        }
                    }
                    dfs(t[1])
                    this.state.tree[1] = t[1];
                });
                _store.catalog.subscribe((data) => {
                    this.state.data = data;
                    this.dirtyCheck();
                    setTimeout(() => {
                        Render.renderDom();
                        setTimeout(() => {
                            window.scrollTo({ top: 0, behavior: 'smooth' });
                        }, 0)
                    }, 0)
                })

                _store.cSection.subscribe((id) => {
                    this.state.cSection = id;
                    this.currprops = [];
                    this.state.page = 1;
                    this.fetch();
                });
                this.fetch();
            }
            props = {};
            currprops = [];
            fuckyou = [];
            fetch(section = null, page = null) {
                setTimeout(() => {
                    this.props = {}
                    let arr = {};
                    this.currprops.forEach((c) => {
                        if (!arr[this.fuckyou[c]]) {
                            arr[this.fuckyou[c]] = []
                        }
                        arr[this.fuckyou[c]].push(c);
                    })
                    if (Object.keys(arr).length) {
                        Api.ffilter(section ?? this.state.cSection, page ?? this.state.page, arr).then((data) => {
                            for (let i = 0; i <= data.data.props.res?.length - 1; i++) {
                                this.props[data.data.props.res[i].id] = {};
                                this.props[data.data.props.res[i].id].name = data.data.props.res[i].name;
                                this.props[data.data.props.res[i].id].values = data.data.props.values[data.data.props.res[i].id].sort((a, b) => parseFloat(a.value) - parseFloat(b.value)).map((c) => {
                                    this.fuckyou[c.id] = c.prop_id;
                                    return { ...c, check: this.currprops.includes(c.id) }
                                });
                            }


                            _store.catalog.next(data.data)
                        });
                    } else {
                        Api.getCatalog(section ?? this.state.cSection, page ?? this.state.page).then((data) => {
                            for (let i = 0; i <= data.data.props.res?.length - 1; i++) {
                                this.props[data.data.props.res[i].id] = {};
                                this.props[data.data.props.res[i].id].name = data.data.props.res[i].name;
                                this.props[data.data.props.res[i].id].values = data.data.props.values[data.data.props.res[i].id].sort((a, b) => parseFloat(a.value) - parseFloat(b.value)).map((c) => {
                                    this.fuckyou[c.id] = c.prop_id;
                                    return { ...c, check: this.currprops.includes(c.id) }
                                });
                            }


                            _store.catalog.next(data.data)
                        });
                    }


                }, 0)


            }
            setPageNext() {
                this.state.page++;
                this.fetch()
            }

            setPagePrev() {
                this.state.page--;
                this.fetch()
            }
            vote(id) {
                this.state.page = 1;

                let f = this.currprops.filter((c) => c === id);
                if (f.length) {
                    this.currprops = this.currprops.filter((c) => c != id);
                } else {
                    this.currprops.push(id);
                }

                this.fetch()
            }
            body() {
                return `
               <div>

                <div r-bind.style="init">
                    <div class="d-flex flex-wrap justify-content-start py-3 mb-4 border-bottom">
                        <a href="/demo/iblockcms-frontend/"
                            class="d-inline-flex align-items-center mb-3 mb-md-0 text-dark text-decoration-none">

                            <span class="fs-4">IBLOCKCMS</span>
                        </a>

                        <ul class="nav nav-pills">
                            <li class="nav-item zhs-menu-event"><a href="#" class="nav-link">Каталог</a>
                                <div class="zhs">
                                    <menu>
                                </div>
                            </li>
                        </ul>
                    </div>
                </div>

                <div class="row my-2">
                    <div r-bind="breadcrumb" class="col-12">
                     
                    </div>
                </div>
                <div class="row">
                    <div r-if="fff" class="ffilter col-3">
                         <div class="mb-2" r-for="ffilter">
                            <span r-bind="name"></span>
                             <div r-for="values">
                                <input r-click="vote.id" type="checkbox" id="horns"></input>
                                <label class="mx-2" r-bind="value"></label>
                               
                            </div>
                        </div>
                    </div>
                    <div r-bind.class="fc"> 
                        <catalog>
                    </div>
                </div>
                <div>
                    <div class="d-flex flex-column">
                        <div style="margin-left: auto;" class="mb-4 pagination">
                            <span r-bind="total"></span>
                        </div>
                        <div style="margin-left: auto;" class="pagination">
                            <nav aria-label="Page navigation example">
                                <ul class="pagination">
                                    <li r-if="pageStart" class="page-item"><span style="cursor:pointer;" r-click="setPagePrev"
                                            class="page-link"><span>prev</span></span>
                                    </li>

                                    <li class="page-item page-link active"><span r-bind="page"></span></li>
                                    <li r-if="pageEnd" class="page-item"><span style="cursor:pointer;" r-click="setPageNext"
                                            class="page-link"><span>next</span></span>
                                    </li>

                                </ul>
                            </nav>
                        </div>
                    </div>
                </div>
                <footer class="pt-3 text-muted border-top">
                    ru51a4 ©️ 2024
                </footer>
            </div>
                `;
            }
        }

        var components = [
            {
                name: 'main',
                component: component_main
            },
            {
                name: 'catalog',
                component: component_catalog
            },
            {
                name: 'menu',
                component: component_menu
            },
            {
                name: 'col',
                component: component_col
            },
        ];

        Render = new render(document.querySelector('.main'), components);

        function _main() {
            Render.renderDom();
            Render.renderDom();
            Render.renderDom();

        }

        _main();

    </script>

</html>
